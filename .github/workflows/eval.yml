name: AI Quality Eval

# Quality-regression gate: runs the eval harness against a frozen
# baseline and fails the build if quality regressed.
#
# Stage 7 — the gate is now QUALITY-AWARE, not just pass/fail. It trips
# (via RegressionReport.has_regression) on ANY of:
#   - a benchmark that was passing the regex gate now fails it
#   - a category whose pass rate dropped >= 10pp
#   - a benchmark whose deterministic critic_score dropped >= 0.15
#     (the grey-couch-that-still-emits-primitive_cube_add failure mode)
#   - a category whose mean critic_score dropped >= 0.10
#   - (Stage 8) a benchmark or category whose estimated COST rose
#     materially with NO quality gain — pure waste. Paying more for
#     better quality is allowed and never trips the gate.
# The posted eval_report.md also surfaces per-category mean critic
# scores, the advisory quality TARGETS (MET/BELOW), first-step
# accuracy, the composition score (the MCP's known weak spot), and
# (Stage 8) run cost, per-category mean cost, and quality-per-dollar.
#
# Triggered on:
#   - PRs that touch the AI surface (backend, prompts, panel) — we
#     only care when the prompt/persona/router could plausibly change
#     output quality. Pure docs/website PRs skip this expensive job.
#   - Push to main as a smoke (cheap insurance against a broken merge).
#   - Manual trigger via workflow_dispatch for ad-hoc verification.
#
# Cost: each run = N benchmarks × ~$0.05-0.10 Opus per call. At 31
# benchmarks one run is ~$2-3. To bound this, consider --filter to a
# fast subset on PRs and the full suite on a schedule. Skipped paths
# above keep this off the critical path of doc PRs.

on:
  pull_request:
    branches: [main]
    paths:
      - "ai-backend/**"
      - "addons/animora_panel/**"
      - "patches/**"
      - ".github/workflows/eval.yml"
  push:
    branches: [main]
    paths:
      - "ai-backend/**"
      - "addons/animora_panel/**"
  workflow_dispatch:

jobs:
  eval:
    name: Quality regression gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-backend/requirements.txt

      # The eval spends real API credits and cannot run without a key. Fail
      # HERE with an actionable message instead of letting runner.py exit one
      # step later — every "quality gate" failure recorded May–July 2026 was
      # this missing secret, not a quality regression.
      - name: Check ANTHROPIC_API_KEY secret is configured
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::Repository secret ANTHROPIC_API_KEY is not set. Add it under Settings → Secrets and variables → Actions → New repository secret. The quality regression gate cannot run without it."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is configured."

      - name: Run eval harness vs baseline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANIMORA_ENV: dev
          PYTHONIOENCODING: utf-8
        run: |
          python ai-backend/eval/runner.py \
            --json eval_run.json \
            --output eval_report.md \
            --baseline ai-backend/eval/baseline.json \
            --fail-on-regress

      # PR-comment the markdown report so reviewers see scores
      # inline without digging into job logs.
      - name: Post eval report as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync('eval_report.md')) {
              core.info('No eval report produced; skipping comment.');
              return;
            }
            const body = fs.readFileSync('eval_report.md', 'utf8').slice(0, 60000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Eval scorecard\n\n${body}`,
            });

      # Always upload the raw JSON dump so future runs can rescore it
      # (via --skip-llm --input-json) without burning credits.
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            eval_run.json
            eval_report.md
          retention-days: 30
