name: AI Quality Eval

# Quality-regression gate: runs the eval harness against a frozen
# baseline and fails the build if quality regressed.
#
# Stage 7 — the gate is now QUALITY-AWARE, not just pass/fail. It trips
# (via RegressionReport.has_regression) on ANY of:
#   - a benchmark that was passing the regex gate now fails it
#   - a category whose pass rate dropped >= 10pp
#   - a benchmark whose deterministic critic_score dropped >= 0.15
#     (the grey-couch-that-still-emits-primitive_cube_add failure mode)
#   - a category whose mean critic_score dropped >= 0.10
#   - (Stage 8) a benchmark or category whose estimated COST rose
#     materially with NO quality gain — pure waste. Paying more for
#     better quality is allowed and never trips the gate.
# The posted eval_report.md also surfaces per-category mean critic
# scores, the advisory quality TARGETS (MET/BELOW), first-step
# accuracy, the composition score (the MCP's known weak spot), and
# (Stage 8) run cost, per-category mean cost, and quality-per-dollar.
#
# Triggered on:
#   - MANUAL ONLY (workflow_dispatch) while the API budget is tiny —
#     V2 decision 2026-07-12. Each full run costs real money (see
#     below); auto-running on every push would burn a $6 budget in two
#     ordinary commits. Run it deliberately from the Actions tab as
#     part of the phase-completion ritual for any change that touches
#     prompts / personas / router / scoring.
#
#   RESTORE WHEN FUNDED: uncomment the pull_request + push triggers
#   below to make the quality gate automatic again (that's the long-term
#   intent — auto-insurance on every AI-surface change).
#
# Cost: each run = N benchmarks × ~$0.05-0.10 Opus per call. At 31
# benchmarks one run is ~$2-3. To bound this, consider --filter to a
# fast subset on PRs and the full suite on a schedule.

#
# Provider note (2026-07-15): the single ANTHROPIC_API_KEY secret slot
# accepts EITHER a direct Anthropic key (sk-ant-...) OR an AWS Bedrock
# long-term API key (ABSK...). The credential-check step detects the
# shape and sets ANIMORA_LLM_PROVIDER accordingly. On Bedrock, Opus
# calls run on Opus 4.6 (4.7 is gated — see docs/BEDROCK.md), so
# baselines are NOT comparable across providers: the first run on a new
# provider must be dispatched with mint_baseline=true and its
# eval_baseline.json artifact committed as the gate's baseline.

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Run only benchmarks whose name contains this substring (diagnostic mode: no gate, no baseline mint)"
        required: false
        default: ""
      mint_baseline:
        description: "Mint a fresh baseline from this run instead of gating against the committed one (full suite only)"
        type: boolean
        required: false
        default: false
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "ai-backend/**"
  #     - "addons/animora_panel/**"
  #     - "patches/**"
  #     - ".github/workflows/eval.yml"
  # push:
  #   branches: [main]
  #   paths:
  #     - "ai-backend/**"
  #     - "addons/animora_panel/**"

jobs:
  eval:
    name: Quality regression gate
    runs-on: ubuntu-latest
    # 60 min: a full 31-benchmark run on Bedrock paces ~73 s/benchmark
    # (~40 min). The 30-min default killed run 29400154299 at benchmark
    # 23/31, losing ~$9 of paid results. Keep comfortably above worst case.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-backend/requirements.txt

      # The eval spends real API credits and cannot run without a key. Fail
      # HERE with an actionable message instead of letting runner.py exit one
      # step later — every "quality gate" failure recorded May–July 2026 was
      # this missing secret, not a quality regression.
      - name: Check API credentials + detect provider
        env:
          API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::Repository secret ANTHROPIC_API_KEY is not set. Paste a direct Anthropic key (sk-ant-...) or an AWS Bedrock long-term API key (ABSK...) under Settings → Secrets and variables → Actions. The quality regression gate cannot run without it."
            exit 1
          fi
          case "$API_KEY" in
            ABSK*)
              echo "Detected AWS Bedrock bearer token — provider=bedrock (Opus runs as 4.6; see docs/BEDROCK.md)."
              echo "ANIMORA_LLM_PROVIDER=bedrock" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Detected direct Anthropic key — provider=anthropic."
              echo "ANIMORA_LLM_PROVIDER=anthropic" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Run eval harness
        env:
          # Single-slot secret: on Bedrock the bearer token is the auth and
          # ANTHROPIC_API_KEY is ignored; on Anthropic the reverse.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.ANTHROPIC_API_KEY }}
          BEDROCK_AWS_REGION: us-east-1
          ANIMORA_ENV: dev
          PYTHONIOENCODING: utf-8
          FILTER: ${{ inputs.filter }}
          MINT_BASELINE: ${{ inputs.mint_baseline }}
        run: |
          if [ -n "$FILTER" ] && [ "$MINT_BASELINE" = "true" ]; then
            echo "::error::Refusing to mint a baseline from a filtered run — a partial baseline would poison the gate."
            exit 1
          fi
          args=( --json eval_run.json --output eval_report.md )
          if [ -n "$FILTER" ]; then
            # Diagnostic mode: subset run, no gate (comparing a subset
            # against the full baseline would report phantom regressions).
            args+=( --filter "$FILTER" )
          elif [ "$MINT_BASELINE" = "true" ]; then
            args+=( --output-baseline eval_baseline.json )
          else
            args+=( --baseline ai-backend/eval/baseline.json --fail-on-regress )
          fi
          python ai-backend/eval/runner.py "${args[@]}"

      # PR-comment the markdown report so reviewers see scores
      # inline without digging into job logs.
      - name: Post eval report as PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (!fs.existsSync('eval_report.md')) {
              core.info('No eval report produced; skipping comment.');
              return;
            }
            const body = fs.readFileSync('eval_report.md', 'utf8').slice(0, 60000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Eval scorecard\n\n${body}`,
            });

      # Always upload the raw JSON dump so future runs can rescore it
      # (via --skip-llm --input-json) without burning credits.
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            eval_run.json
            eval_report.md
            eval_baseline.json
          retention-days: 30
