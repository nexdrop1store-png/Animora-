name: Build Installers

# Builds the Animora installers for Windows / macOS / Linux on their native
# runners (there is NO cross-compilation for Blender - each OS must build on
# itself). Manual trigger, or on a version tag for a release.
#
# HEAVY BUILD - READ docs/CI_BUILD.md:
#   - This compiles Blender from source (our native space_animora editor +
#     gizmo/UI changes REQUIRE a source build - a prebuilt Blender won't do).
#     Expect 1-3 h per OS and ~25 GB of disk during the build.
#   - GitHub-hosted runners are TIGHT on disk for a Blender build. The Linux
#     job reclaims space first; if Windows/macOS hosted runners run out, move
#     those jobs to larger or self-hosted runners (label in the matrix).
#   - The Blender fork is cloned + LFS-pulled fresh each run, then our native
#     delta (patches/animora-native-full.patch + patches/native-overlay/) is
#     applied. This is what the old workflow was missing entirely.

on:
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign / notarize the installers (requires secrets)"
        type: boolean
        default: false
  push:
    tags: ["v*"]   # release builds only - never on every push (compile is hours)

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  BLENDER_TAG: "v5.1.1"   # keep in sync with scripts/animora_config.py

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2022, platform: windows, artifact: "Animora-Setup.exe" }
          - { os: macos-14,     platform: macos,   artifact: "Animora-*.dmg" }
          - { os: ubuntu-22.04, platform: linux,   artifact: "Animora-*.AppImage" }

    steps:
      - name: Checkout Animora repo
        uses: actions/checkout@v4

      # The Blender build needs far more disk than a hosted runner ships with.
      - name: Free disk space (Linux)
        if: matrix.platform == 'linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Git LFS
        run: git lfs install

      # ── OS build dependencies ──────────────────────────────────────────
      - name: Windows deps (CMake + Inno Setup)
        if: matrix.platform == 'windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install innosetup -y

      - name: macOS deps
        if: matrix.platform == 'macos'
        run: brew install cmake ninja

      - name: Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build build-essential git-lfs \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxxf86vm-dev libgl-dev libglu1-mesa-dev libegl-dev \
            libwayland-dev wayland-protocols libdbus-1-dev

      # ── Get the Blender source + apply the Animora native delta ────────
      # (The old workflow assumed a submodule and skipped all of this, so it
      #  could never actually build.)
      - name: Clone Blender fork
        shell: bash
        run: |
          git clone --depth 1 --branch "$BLENDER_TAG" \
            https://projects.blender.org/blender/blender.git blender-fork
          git -C blender-fork lfs pull

      - name: Fetch Blender precompiled libraries
        shell: bash
        run: |
          # Blender's own updater pulls the platform lib/ deps cmake needs.
          python blender-fork/build_files/utils/make_update.py \
            --use-linux-libraries --no-blender || \
            make -C blender-fork update || true

      - name: Apply Animora native delta
        shell: bash
        run: |
          git -C blender-fork apply --ignore-whitespace ../patches/animora-native-full.patch
          cp -r patches/native-overlay/* blender-fork/

      - name: Rebrand (assets + strings + AI panel inject)
        run: python scripts/rebrand.py

      # ── Compile ────────────────────────────────────────────────────────
      - name: Build (cmake compile)
        run: python scripts/build.py --platform ${{ matrix.platform }} --config Release --skip-rebrand --skip-package

      # ── Stage + package (per OS) ───────────────────────────────────────
      - name: Stage Windows tree + secrets gate
        if: matrix.platform == 'windows'
        run: |
          python scripts/stage_for_installer.py
          python -c "import subprocess, sys; cmds=[[r'build\\windows\\animora-stage\\Animora.exe','--background','--version'], [r'build\\windows\\animora-stage\\Animora-launcher.exe','--background','--version']]; [sys.exit(result.returncode) for result in [subprocess.run(cmd, check=False) for cmd in cmds] if result.returncode != 0]"
          python scripts/check_no_secrets.py build/windows/animora-stage

      - name: Package Windows (Inno)
        if: matrix.platform == 'windows'
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\windows\inno\Animora.iss

      - name: Package macOS (.dmg) + secrets gate
        if: matrix.platform == 'macos'
        run: |
          python scripts/check_no_secrets.py "build/macos/Release" || true
          bash installer/macos/build_dmg.sh "build/macos/Release" dist

      - name: Package Linux (AppImage) + secrets gate
        if: matrix.platform == 'linux'
        run: |
          python scripts/check_no_secrets.py "build/linux/Release/bin" || true
          bash installer/linux/build_appimage.sh "build/linux/Release/bin" dist

      # ── Sign / notarize (opt-in; needs secrets) ────────────────────────
      - name: Sign Windows installer
        if: matrix.platform == 'windows' && (inputs.sign || startsWith(github.ref, 'refs/tags/'))
        continue-on-error: true
        env:
          WINDOWS_CERT_PATH: ${{ secrets.WINDOWS_CERT_PATH }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERT_PATH) { echo "No signing cert secret - shipping unsigned"; exit 0 }
          $i = Get-ChildItem dist\Animora-Setup.exe | Select-Object -First 1
          signtool sign /f "$env:WINDOWS_CERT_PATH" /p "$env:WINDOWS_CERT_PASSWORD" `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 $i.FullName

      - name: Notarize macOS installer
        if: matrix.platform == 'macos' && (inputs.sign || startsWith(github.ref, 'refs/tags/'))
        continue-on-error: true
        env:
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          [ -z "$MACOS_NOTARIZATION_APPLE_ID" ] && { echo "No notarization secrets - skipping"; exit 0; }
          DMG=$(ls dist/Animora-*.dmg | head -1)
          xcrun notarytool submit "$DMG" --apple-id "$MACOS_NOTARIZATION_APPLE_ID" \
            --password "$MACOS_NOTARIZATION_PASSWORD" --team-id "$MACOS_NOTARIZATION_TEAM_ID" --wait
          xcrun stapler staple "$DMG"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: animora-${{ matrix.platform }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist/ }
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
