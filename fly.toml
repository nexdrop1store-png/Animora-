# Fly.io config for the Animora AI backend (the server that holds the Bedrock
# key as a secret and talks to Bedrock on the app's behalf).
#
# Deploy from the REPO ROOT (the build context must include ai-backend/):
#   fly deploy
# Full guide + the `fly secrets set` steps: docs/DEPLOY.md
#
# NOTE: `app` must be globally unique on Fly — change it if taken.

app = "animora-backend"
primary_region = "iad"   # us-east, same region as the Bedrock models (us-east-1)

[build]
  dockerfile = "ai-backend/Dockerfile"

# Non-secret config only. The SECRETS — AWS_BEARER_TOKEN_BEDROCK, JWT_SECRET,
# REDIS_URL — are set with `fly secrets set ...` and injected as env vars at
# runtime; they are NEVER in this file, the image, or git.
[env]
  ANIMORA_ENV = "production"
  ANIMORA_LLM_PROVIDER = "bedrock"
  BEDROCK_AWS_REGION = "us-east-1"

[http_service]
  internal_port = 8000
  force_https = true            # TLS everywhere
  # Keep one machine alive: WebSocket sessions can't survive a scale-to-zero.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
